name: Java CI with Maven

# Kích hoạt workflow khi có push hoặc pull_request
on:
  push:
    branches: [ "main", "phuong" ]
  pull_request:
    branches: [ "main", "phuong"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Checkout mã nguồn từ repository
      - name: Checkout code
        uses: actions/checkout@v4  # Lấy code về

      # Bước 2: Thiết lập môi trường Java (JDK 21)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven  # Tối ưu hóa thời gian build bằng cách cache các dependencies

      # Bước 3: Thực thi vòng đời build của Maven (chạy test và đóng gói .jar)
      - name: Build with Maven
        run: mvn clean package

      # Bước 4: Upload tệp .jar vừa được tạo ra thành Artifact
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BankSystem-jar
          path: target/BankSystem-*.jar
          retention-days: 7 # Lưu giữ artifact trong 7 ngày

